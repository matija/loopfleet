<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loopfleet</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: #14151a;
        color: #e6e6e6;
        display: flex;
        justify-content: center;
      }
      .shell {
        width: 100%;
        max-width: 860px;
        padding: 48px 24px;
      }
      h1 {
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 4px;
      }
      .sub {
        color: #8a8f98;
        margin: 0 0 32px;
      }
      button {
        font: inherit;
        font-weight: 500;
        color: #14151a;
        background: #e6e6e6;
        border: none;
        border-radius: 8px;
        padding: 10px 16px;
        cursor: pointer;
      }
      button:hover {
        background: #fff;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      button.mini {
        padding: 4px 10px;
        font-size: 13px;
      }
      select {
        font: inherit;
        font-size: 13px;
        color: #e6e6e6;
        background: #1c1e26;
        border: 1px solid #2c2f3a;
        border-radius: 6px;
        padding: 4px 6px;
      }
      .msg {
        margin-top: 12px;
        min-height: 20px;
        font-size: 14px;
      }
      .msg.err {
        color: #ff8a8a;
      }
      .msg.ok {
        color: #8affb0;
      }
      h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #8a8f98;
        margin: 40px 0 12px;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li.project {
        padding: 10px 12px;
        border: 1px solid #262830;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      li.project:hover {
        border-color: #3a3d48;
      }
      li.project.sel {
        border-color: #5b8cff;
      }
      li.project .conv {
        color: #8a8f98;
        font-size: 12px;
      }
      .empty {
        color: #8a8f98;
        font-size: 14px;
      }
      /* Agents status strip */
      #agents {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }
      .agent {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid #262830;
        border-radius: 8px;
        font-size: 12px;
        color: #c5c9d3;
      }
      .agent .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4a4d57;
      }
      .agent.on .dot {
        background: #8affb0;
      }
      .agent.off {
        color: #8a8f98;
      }
      .agent.off .dot {
        background: #ff8a8a;
      }
      .agent .ver {
        color: #8a8f98;
      }
      .agent .warn {
        color: #ffd479;
      }
      /* Plan view */
      .plan-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      .plan-path {
        color: #8a8f98;
        font-size: 12px;
        margin: 0 0 16px;
      }
      .task {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid #262830;
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 14px;
      }
      .task .text {
        flex: 1;
      }
      .task.checked .text {
        color: #8a8f98;
        text-decoration: line-through;
      }
      .badge {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 3px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .badge.not-started {
        background: #23262f;
        color: #8a8f98;
      }
      .badge.in-progress {
        background: #1e3a5f;
        color: #7cc0ff;
      }
      .badge.completed-unaccepted {
        background: #4a3410;
        color: #ffcf6b;
      }
      .badge.accepted {
        background: #14401f;
        color: #8affb0;
      }
      /* completed-unaccepted surfaced loudly: highlight the whole row */
      .task.completed-unaccepted {
        border-color: #ffcf6b;
        background: #221a08;
      }
      .runmeta {
        color: #8a8f98;
        font-size: 12px;
        min-width: 44px;
        text-align: right;
      }
      .review {
        margin: 0 0 16px;
        padding: 10px 12px;
        border: 1px solid #ffcf6b;
        border-radius: 8px;
        background: #221a08;
        color: #ffcf6b;
        font-size: 13px;
        font-weight: 500;
      }
      details.raw {
        margin-top: 28px;
      }
      details.raw summary {
        cursor: pointer;
        color: #8a8f98;
        font-size: 13px;
      }
      pre.md {
        margin-top: 12px;
        padding: 14px;
        background: #0f1014;
        border: 1px solid #262830;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        color: #c9ccd4;
      }
      /* Run list + timeline */
      .runs {
        margin: 0 0 6px 0;
        padding: 0 0 4px 22px;
      }
      .runrow {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        padding: 4px 0;
      }
      .runrow .rid {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #8a8f98;
        font-size: 12px;
      }
      .dot {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .dot.running { background: #1e3a5f; color: #7cc0ff; }
      .dot.completed { background: #4a3410; color: #ffcf6b; }
      .dot.accepted { background: #14401f; color: #8affb0; }
      .dot.failed { background: #3a1e1e; color: #ff8a8a; }
      .dot.queued, .dot.stopped { background: #23262f; color: #8a8f98; }
      .timeline {
        margin: 24px 0;
        padding: 16px;
        border: 1px solid #2c2f3a;
        border-radius: 10px;
        background: #16171d;
      }
      .timeline .head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .timeline .head .rid {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #8a8f98;
        flex: 1;
      }
      details.iter {
        border: 1px solid #262830;
        border-radius: 8px;
        margin-bottom: 8px;
        background: #0f1014;
      }
      details.iter > summary {
        cursor: pointer;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 500;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      details.iter > summary .stat {
        color: #8a8f98;
        font-weight: 400;
        font-size: 12px;
      }
      .iterbody {
        padding: 4px 12px 12px;
      }
      .evt {
        font-size: 12px;
        line-height: 1.6;
        border-bottom: 1px solid #1c1e26;
        padding: 3px 0;
        display: flex;
        gap: 8px;
      }
      .evt .k {
        color: #7cc0ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        min-width: 120px;
      }
      .evt .d {
        color: #c9ccd4;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        flex: 1;
      }
      .files {
        margin: 10px 0 6px;
      }
      .filerow {
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #c9ccd4;
        padding: 2px 0;
      }
      .filerow .st { color: #8a8f98; }
      .filerow .add { color: #8affb0; }
      .filerow .del { color: #ff8a8a; }
      pre.patch {
        margin: 6px 0 0;
        padding: 12px;
        background: #0b0c10;
        border: 1px solid #1c1e26;
        border-radius: 6px;
        overflow-x: auto;
        font-size: 11.5px;
        line-height: 1.45;
      }
      /* Compare view: runs as side-by-side columns. */
      .cmpcols {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 4px 0;
      }
      .cmpcol {
        flex: 1 1 320px;
        min-width: 300px;
        background: #0d0e13;
        border: 1px solid #1c1e26;
        border-radius: 8px;
        padding: 12px;
      }
      .cmphead {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .cmpcol .stat { color: #8a8f98; font-size: 12px; margin-bottom: 6px; }
      .userun {
        display: flex;
        gap: 6px;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #1c1e26;
      }
      .userun input {
        flex: 1;
        min-width: 0;
        background: #0b0c10;
        border: 1px solid #262933;
        border-radius: 6px;
        color: #e6e6e6;
        padding: 5px 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>loopfleet</h1>
      <p class="sub">Register a git repository, then launch looping runs against its plan tasks.</p>

      <button id="add">Add project…</button>
      <div id="msg" class="msg"></div>

      <h2>Agents</h2>
      <div id="agents"></div>

      <h2>Projects</h2>
      <ul id="projects"></ul>
      <p id="empty" class="empty">No projects registered yet.</p>

      <div id="live"></div>
      <div id="plan"></div>
      <div id="compare"></div>
      <div id="timeline"></div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;
      const { open } = window.__TAURI__.dialog;
      const { listen } = window.__TAURI__.event;

      const addBtn = document.getElementById("add");
      const msg = document.getElementById("msg");
      const list = document.getElementById("projects");
      const empty = document.getElementById("empty");
      const agentsEl = document.getElementById("agents");
      const planEl = document.getElementById("plan");
      const liveEl = document.getElementById("live");
      const compareEl = document.getElementById("compare");
      const timelineEl = document.getElementById("timeline");

      const AGENTS = ["claude", "pi", "cursor"];
      let selectedProject = null;
      // The plan views last loaded, so the compare view can re-resolve a plan by
      // id after a "use this run" reload.
      let currentPlans = [];

      // The live run currently shown, if any. Streamed `run_event`/`run_status`
      // Tauri events are dispatched to it by matching run_id.
      let live = null; // { runId, eventsEl, filesEl, files:Set, dot, stopBtn }

      function isTerminal(status) {
        return status === "completed" || status === "failed" || status === "stopped";
      }

      // Open a live view for a just-launched run: streaming events, the set of
      // files it has changed, and a Stop button.
      function showLive(runId) {
        liveEl.innerHTML = "";
        const box = document.createElement("div");
        box.className = "timeline";

        const head = document.createElement("div");
        head.className = "head";
        const h = document.createElement("h2");
        h.style.margin = "0";
        h.textContent = "Live run";
        head.appendChild(h);
        const rid = document.createElement("span");
        rid.className = "rid";
        rid.textContent = runId.slice(0, 8);
        head.appendChild(rid);
        const dot = document.createElement("span");
        dot.className = "dot running";
        dot.textContent = "running";
        head.appendChild(dot);
        const stopBtn = document.createElement("button");
        stopBtn.className = "mini";
        stopBtn.textContent = "Stop";
        stopBtn.addEventListener("click", async () => {
          stopBtn.disabled = true;
          try {
            await invoke("stop_run", { runId });
          } catch (e) {
            setMsg(String(e), "err");
          }
        });
        head.appendChild(stopBtn);
        const close = document.createElement("button");
        close.className = "mini";
        close.textContent = "Close";
        close.addEventListener("click", () => {
          liveEl.innerHTML = "";
          live = null;
        });
        head.appendChild(close);
        box.appendChild(head);

        const filesWrap = document.createElement("div");
        filesWrap.className = "files";
        const filesEl = document.createElement("div");
        filesWrap.appendChild(filesEl);
        box.appendChild(filesWrap);

        const eventsEl = document.createElement("div");
        eventsEl.className = "iterbody";
        eventsEl.style.maxHeight = "320px";
        eventsEl.style.overflowY = "auto";
        box.appendChild(eventsEl);

        liveEl.appendChild(box);
        live = { runId, eventsEl, filesEl, files: new Set(), dot, stopBtn };
      }

      function onRunEvent(runId, ev) {
        if (!live || live.runId !== runId) return;
        if (ev.kind === "file_changed") {
          if (ev.path && !live.files.has(ev.path)) {
            live.files.add(ev.path);
            const fr = document.createElement("div");
            fr.className = "filerow";
            fr.textContent = ev.path;
            live.filesEl.appendChild(fr);
          }
          return;
        }
        const row = document.createElement("div");
        row.className = "evt";
        const k = document.createElement("span");
        k.className = "k";
        k.textContent = (ev.kind || "?").replace(/_/g, " ");
        row.appendChild(k);
        const det = document.createElement("span");
        det.className = "d";
        det.textContent = eventDetail(ev);
        row.appendChild(det);
        live.eventsEl.appendChild(row);
        live.eventsEl.scrollTop = live.eventsEl.scrollHeight;
      }

      function onRunStatus(runId, status) {
        if (!live || live.runId !== runId) return;
        live.dot.className = "dot " + status;
        live.dot.textContent = status;
        if (isTerminal(status)) {
          live.stopBtn.disabled = true;
          // Refresh the plan so the run's status dot updates in its task list.
          if (selectedProject) loadPlan(selectedProject);
        }
      }

      listen("run_event", (e) => onRunEvent(e.payload.run_id, e.payload.event));
      listen("run_status", (e) => onRunStatus(e.payload.run_id, e.payload.status));

      function setMsg(text, cls) {
        msg.textContent = text;
        msg.className = "msg" + (cls ? " " + cls : "");
      }

      // Agent CLI availability + version drift. Installed agents show green with
      // their version; a version differing from the tested one warns; a missing
      // CLI shows red so the user knows a run with it will be refused.
      async function loadAgents() {
        let statuses = [];
        try {
          statuses = await invoke("agent_status");
        } catch (e) {
          agentsEl.textContent = String(e);
          return;
        }
        agentsEl.innerHTML = "";
        for (const s of statuses) {
          const el = document.createElement("div");
          el.className = "agent " + (s.installed ? "on" : "off");
          const dot = document.createElement("span");
          dot.className = "dot";
          el.appendChild(dot);
          const name = document.createElement("span");
          name.textContent = s.display;
          el.appendChild(name);
          if (s.installed) {
            const ver = document.createElement("span");
            ver.className = "ver";
            ver.textContent = s.version || "installed";
            el.appendChild(ver);
            if (s.version && s.version_matches === false) {
              const warn = document.createElement("span");
              warn.className = "warn";
              warn.textContent = "tested " + s.tested_version;
              warn.title =
                "Adapter tested against " +
                s.tested_version +
                "; you have " +
                s.version;
              el.appendChild(warn);
            }
          } else {
            const d = document.createElement("span");
            d.className = "ver";
            d.textContent = s.detail || "not installed";
            el.appendChild(d);
          }
          agentsEl.appendChild(el);
        }
      }

      async function refresh() {
        const projects = await invoke("list_projects");
        list.innerHTML = "";
        empty.style.display = projects.length ? "none" : "block";
        for (const p of projects) {
          const li = document.createElement("li");
          li.className = "project" + (p.id === selectedProject ? " sel" : "");
          li.textContent = p.repo_path;
          const conv = document.createElement("div");
          conv.className = "conv";
          conv.textContent = "convention: " + p.plan_convention;
          li.appendChild(conv);
          li.addEventListener("click", () => selectProject(p.id));
          list.appendChild(li);
        }
      }

      async function selectProject(id) {
        selectedProject = id;
        await refresh();
        await loadPlan(id);
      }

      async function loadPlan(id) {
        planEl.innerHTML = "";
        timelineEl.innerHTML = "";
        compareEl.innerHTML = "";
        let views;
        try {
          views = await invoke("plan_overview", { projectId: id });
        } catch (e) {
          planEl.innerHTML = "";
          const p = document.createElement("p");
          p.className = "msg err";
          p.textContent = String(e);
          planEl.appendChild(p);
          return;
        }
        currentPlans = views;
        if (!views.length) {
          const p = document.createElement("p");
          p.className = "empty";
          p.textContent = "No plan found (expected PRD.md at the repo root).";
          planEl.appendChild(p);
          return;
        }
        for (const v of views) await renderPlan(v);
      }

      async function renderPlan(v) {
        const h = document.createElement("h2");
        h.textContent = "Plan";
        planEl.appendChild(h);

        const title = document.createElement("p");
        title.className = "plan-title";
        title.textContent = v.title || "(untitled plan)";
        planEl.appendChild(title);

        const path = document.createElement("p");
        path.className = "plan-path";
        path.textContent = v.file_path;
        planEl.appendChild(path);

        const reviewCount = v.tasks.filter(
          (t) => t.status === "completed-unaccepted"
        ).length;
        if (reviewCount) {
          const r = document.createElement("div");
          r.className = "review";
          r.textContent =
            reviewCount +
            (reviewCount === 1 ? " task is" : " tasks are") +
            " completed and waiting to be reviewed.";
          planEl.appendChild(r);
        }

        // Runs bound to this plan, grouped by task, so each task can list its
        // runs and open a run's timeline.
        let runs = [];
        try {
          runs = await invoke("plan_runs", { planId: v.plan_id });
        } catch (e) {
          /* a plan with no runs yet is fine */
        }
        const byTask = {};
        for (const r of runs) (byTask[r.task_anchor] ||= []).push(r);

        for (const t of v.tasks)
          planEl.appendChild(renderTask(v, t, byTask[t.anchor] || []));

        const details = document.createElement("details");
        details.className = "raw";
        const summary = document.createElement("summary");
        summary.textContent = "Frozen plan source";
        details.appendChild(summary);
        const pre = document.createElement("pre");
        pre.className = "md";
        pre.textContent = v.markdown;
        details.appendChild(pre);
        planEl.appendChild(details);
      }

      function renderTask(plan, t, runs) {
        const frag = document.createDocumentFragment();
        const row = document.createElement("div");
        row.className = "task " + t.status + (t.checked ? " checked" : "");

        const badge = document.createElement("span");
        badge.className = "badge " + t.status;
        badge.textContent = t.status.replace(/-/g, " ");
        row.appendChild(badge);

        const text = document.createElement("span");
        text.className = "text";
        text.textContent = t.text;
        row.appendChild(text);

        const meta = document.createElement("span");
        meta.className = "runmeta";
        meta.textContent = t.run_count ? t.run_count + " run" + (t.run_count === 1 ? "" : "s") : "";
        row.appendChild(meta);

        // Compare / review affordance: side-by-side final-ref diffs of this
        // task's runs, each with a "use this run" merge control.
        if (runs.length) {
          const cbtn = document.createElement("button");
          cbtn.className = "mini";
          cbtn.textContent = runs.length > 1 ? "Compare runs" : "Review run";
          cbtn.addEventListener("click", () => showCompare(plan, t));
          row.appendChild(cbtn);
        }

        // Launch affordance: agent + iteration count + Run. Authored-checked
        // tasks are excluded from launching (PRD: `checked` gates launch).
        if (!t.checked) {
          const agentSel = document.createElement("select");
          for (const a of AGENTS) {
            const o = document.createElement("option");
            o.value = a;
            o.textContent = a;
            agentSel.appendChild(o);
          }
          row.appendChild(agentSel);

          const iterSel = document.createElement("select");
          for (const n of [1, 3, 5, 10]) {
            const o = document.createElement("option");
            o.value = String(n);
            o.textContent = "×" + n;
            if (n === 5) o.selected = true;
            iterSel.appendChild(o);
          }
          row.appendChild(iterSel);

          const btn = document.createElement("button");
          btn.className = "mini";
          btn.textContent = "Run";
          btn.addEventListener("click", async () => {
            btn.disabled = true;
            setMsg("");
            try {
              const runId = await invoke("launch_run", {
                projectId: selectedProject,
                taskAnchor: t.anchor,
                agent: agentSel.value,
                maxIterations: Number(iterSel.value),
              });
              setMsg("Launched run " + runId, "ok");
              showLive(runId);
              await loadPlan(selectedProject);
            } catch (e) {
              setMsg(String(e), "err");
              btn.disabled = false;
            }
          });
          row.appendChild(btn);
        }

        frag.appendChild(row);

        // Each bound run: a status dot, its short id, and a Timeline button.
        if (runs.length) {
          const box = document.createElement("div");
          box.className = "runs";
          for (const r of runs) {
            const rr = document.createElement("div");
            rr.className = "runrow";

            const dot = document.createElement("span");
            dot.className = "dot " + (r.accepted ? "accepted" : r.status);
            dot.textContent = r.accepted ? "accepted" : r.status;
            rr.appendChild(dot);

            const rid = document.createElement("span");
            rid.className = "rid";
            rid.textContent = r.id.slice(0, 8);
            rr.appendChild(rid);

            const tbtn = document.createElement("button");
            tbtn.className = "mini";
            tbtn.textContent = "Timeline";
            tbtn.addEventListener("click", () => showTimeline(r.id));
            rr.appendChild(tbtn);

            box.appendChild(rr);
          }
          frag.appendChild(box);
        }

        return frag;
      }

      // The task currently open in the compare view, so a successful "use this
      // run" can re-render it (and the plan) with fresh acceptance state.
      let compareCtx = null; // { planId, task }

      async function showCompare(plan, task) {
        compareCtx = { planId: plan.plan_id, task };
        compareEl.innerHTML = "";
        let view;
        try {
          view = await invoke("compare_task", {
            planId: plan.plan_id,
            taskAnchor: task.anchor,
          });
        } catch (e) {
          setMsg(String(e), "err");
          return;
        }
        renderCompare(view, task);
        compareEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function renderCompare(view, task) {
        const box = document.createElement("div");
        box.className = "timeline";

        const head = document.createElement("div");
        head.className = "head";
        const h = document.createElement("h2");
        h.style.margin = "0";
        h.textContent = "Compare runs";
        head.appendChild(h);
        const sub = document.createElement("span");
        sub.className = "rid";
        sub.textContent = task.text;
        head.appendChild(sub);
        const close = document.createElement("button");
        close.className = "mini";
        close.textContent = "Close";
        close.addEventListener("click", () => {
          compareEl.innerHTML = "";
          compareCtx = null;
        });
        head.appendChild(close);
        box.appendChild(head);

        if (!view.runs.length) {
          const p = document.createElement("p");
          p.className = "empty";
          p.textContent = "No runs to compare yet.";
          box.appendChild(p);
        }

        const cols = document.createElement("div");
        cols.className = "cmpcols";
        for (const r of view.runs) cols.appendChild(renderRunColumn(r));
        box.appendChild(cols);

        compareEl.appendChild(box);
      }

      function renderRunColumn(r) {
        const col = document.createElement("div");
        col.className = "cmpcol";

        const head = document.createElement("div");
        head.className = "cmphead";
        const dot = document.createElement("span");
        dot.className = "dot " + (r.accepted ? "accepted" : r.status);
        dot.textContent = r.accepted ? "accepted" : r.status;
        head.appendChild(dot);
        const rid = document.createElement("span");
        rid.className = "rid";
        rid.textContent = r.run_id.slice(0, 8) + " · " + r.agent;
        head.appendChild(rid);
        col.appendChild(head);

        // The run's final-ref diff (what it produced against its base).
        const files = r.diff ? r.diff.files : [];
        const ins = files.reduce((a, f) => a + f.insertions, 0);
        const del = files.reduce((a, f) => a + f.deletions, 0);
        const stat = document.createElement("div");
        stat.className = "stat";
        stat.textContent = r.diff
          ? files.length + " file" + (files.length === 1 ? "" : "s") + " · +" + ins + " −" + del
          : r.final_ref
          ? "diff unavailable"
          : "no snapshot";
        col.appendChild(stat);

        if (files.length) {
          const fl = document.createElement("div");
          fl.className = "files";
          for (const f of files) {
            const fr = document.createElement("div");
            fr.className = "filerow";
            const st = document.createElement("span");
            st.className = "st";
            st.textContent = f.status[0].toUpperCase() + " ";
            fr.appendChild(st);
            fr.appendChild(
              document.createTextNode(f.old_path ? f.old_path + " → " + f.path : f.path)
            );
            const counts = document.createElement("span");
            counts.innerHTML =
              ' <span class="add">+' + f.insertions + '</span> <span class="del">−' +
              f.deletions + "</span>";
            fr.appendChild(counts);
            fl.appendChild(fr);
          }
          col.appendChild(fl);

          if (r.diff.patch.trim()) {
            const details = document.createElement("details");
            const sm = document.createElement("summary");
            sm.style.cursor = "pointer";
            sm.style.fontSize = "12px";
            sm.style.color = "#8a8f98";
            sm.textContent = "Patch";
            details.appendChild(sm);
            const pre = document.createElement("pre");
            pre.className = "patch";
            pre.textContent = r.diff.patch;
            details.appendChild(pre);
            col.appendChild(details);
          }
        }

        // "Use this run": merge its branch into a user-named target. Never
        // prefilled (PRD: never targets your main branch by default). Disabled
        // when there is no snapshot to merge.
        const use = document.createElement("div");
        use.className = "userun";
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "target branch (e.g. review/task-a)";
        use.appendChild(input);
        const ubtn = document.createElement("button");
        ubtn.className = "mini";
        ubtn.textContent = "Use this run";
        ubtn.disabled = !r.final_ref;
        ubtn.addEventListener("click", async () => {
          const target = input.value.trim();
          if (!target) {
            setMsg("Enter a target branch name.", "err");
            return;
          }
          ubtn.disabled = true;
          setMsg("");
          try {
            const res = await invoke("use_run", { runId: r.run_id, targetBranch: target });
            setMsg(
              (res.created ? "Created branch " : "Merged into ") +
                res.target_branch +
                (res.up_to_date ? " (already up to date)" : ""),
              "ok"
            );
            if (compareCtx) {
              await loadPlan(selectedProject);
              const plan = currentPlans.find((v) => v.plan_id === compareCtx.planId);
              if (plan) await showCompare(plan, compareCtx.task);
            }
          } catch (e) {
            setMsg(String(e), "err");
            ubtn.disabled = false;
          }
        });
        use.appendChild(ubtn);
        col.appendChild(use);

        return col;
      }

      async function showTimeline(runId) {
        timelineEl.innerHTML = "";
        let tl;
        try {
          tl = await invoke("run_timeline", { runId });
        } catch (e) {
          setMsg(String(e), "err");
          return;
        }
        renderTimeline(tl);
        timelineEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function renderTimeline(tl) {
        const box = document.createElement("div");
        box.className = "timeline";

        const head = document.createElement("div");
        head.className = "head";
        const h = document.createElement("h2");
        h.style.margin = "0";
        h.textContent = "Run timeline";
        head.appendChild(h);
        const meta = document.createElement("span");
        meta.className = "rid";
        meta.textContent = tl.run_id.slice(0, 8) + " · " + tl.agent;
        head.appendChild(meta);
        const dot = document.createElement("span");
        dot.className = "dot " + tl.status;
        dot.textContent = tl.status;
        head.appendChild(dot);
        const close = document.createElement("button");
        close.className = "mini";
        close.textContent = "Close";
        close.addEventListener("click", () => (timelineEl.innerHTML = ""));
        head.appendChild(close);
        box.appendChild(head);

        if (!tl.iterations.length) {
          const p = document.createElement("p");
          p.className = "empty";
          p.textContent = "No iterations recorded yet.";
          box.appendChild(p);
        }

        for (const it of tl.iterations) box.appendChild(renderIteration(it));
        timelineEl.appendChild(box);
      }

      function renderIteration(it) {
        const d = document.createElement("details");
        d.className = "iter";
        if (it.n === 1) d.open = true;

        const summary = document.createElement("summary");
        const label = document.createElement("span");
        label.textContent = "Iteration " + it.n;
        summary.appendChild(label);
        const stat = document.createElement("span");
        stat.className = "stat";
        const files = it.diff ? it.diff.files.length : 0;
        const ins = it.diff ? it.diff.files.reduce((a, f) => a + f.insertions, 0) : 0;
        const del = it.diff ? it.diff.files.reduce((a, f) => a + f.deletions, 0) : 0;
        stat.textContent =
          it.events.length +
          " event" + (it.events.length === 1 ? "" : "s") +
          " · " + files + " file" + (files === 1 ? "" : "s") +
          (it.diff ? " · +" + ins + " −" + del : "");
        summary.appendChild(stat);
        d.appendChild(summary);

        const body = document.createElement("div");
        body.className = "iterbody";

        for (const ev of it.events) {
          const row = document.createElement("div");
          row.className = "evt";
          const k = document.createElement("span");
          k.className = "k";
          k.textContent = (ev.event.kind || "?").replace(/_/g, " ");
          row.appendChild(k);
          const det = document.createElement("span");
          det.className = "d";
          det.textContent = eventDetail(ev.event);
          row.appendChild(det);
          body.appendChild(row);
        }

        if (it.diff && it.diff.files.length) {
          const fl = document.createElement("div");
          fl.className = "files";
          for (const f of it.diff.files) {
            const fr = document.createElement("div");
            fr.className = "filerow";
            const st = document.createElement("span");
            st.className = "st";
            st.textContent = f.status[0].toUpperCase() + " ";
            fr.appendChild(st);
            fr.appendChild(
              document.createTextNode(
                f.old_path ? f.old_path + " → " + f.path : f.path
              )
            );
            const counts = document.createElement("span");
            counts.innerHTML =
              ' <span class="add">+' + f.insertions + '</span> <span class="del">−' +
              f.deletions + "</span>";
            fr.appendChild(counts);
            fl.appendChild(fr);
          }
          body.appendChild(fl);

          if (it.diff.patch.trim()) {
            const details = document.createElement("details");
            const sm = document.createElement("summary");
            sm.style.cursor = "pointer";
            sm.style.fontSize = "12px";
            sm.style.color = "#8a8f98";
            sm.textContent = "Patch";
            details.appendChild(sm);
            const pre = document.createElement("pre");
            pre.className = "patch";
            pre.textContent = it.diff.patch;
            details.appendChild(pre);
            body.appendChild(details);
          }
        }

        d.appendChild(body);
        return d;
      }

      // A short human detail for one normalized event, by kind.
      function eventDetail(e) {
        switch (e.kind) {
          case "assistant_text":
          case "reasoning":
            return e.text || "";
          case "tool_call":
            return e.name + (e.input_excerpt ? " " + e.input_excerpt : "");
          case "tool_result":
            return (e.ok ? "ok" : "error") + (e.output_excerpt ? " " + e.output_excerpt : "");
          case "command_run":
            return e.cmd + (e.exit != null ? " (exit " + e.exit + ")" : "");
          case "turn_completed":
            return e.usage ? "in " + e.usage.input_tokens + " / out " + e.usage.output_tokens : "";
          case "failed":
            return e.reason || "";
          case "file_changed":
            return e.path || "";
          default:
            return "";
        }
      }

      addBtn.addEventListener("click", async () => {
        const folder = await open({ directory: true, multiple: false });
        if (!folder) return;
        addBtn.disabled = true;
        setMsg("");
        try {
          const project = await invoke("register_project", { path: folder });
          setMsg("Registered " + project.repo_path, "ok");
          await refresh();
        } catch (e) {
          setMsg(String(e), "err");
        } finally {
          addBtn.disabled = false;
        }
      });

      loadAgents();
      refresh();
    </script>
  </body>
</html>
