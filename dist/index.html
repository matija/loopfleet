<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loopfleet</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: #14151a;
        color: #e6e6e6;
        display: flex;
        justify-content: center;
      }
      .shell {
        width: 100%;
        max-width: 860px;
        padding: 48px 24px;
      }
      h1 {
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 4px;
      }
      .sub {
        color: #8a8f98;
        margin: 0 0 32px;
      }
      button {
        font: inherit;
        font-weight: 500;
        color: #14151a;
        background: #e6e6e6;
        border: none;
        border-radius: 8px;
        padding: 10px 16px;
        cursor: pointer;
      }
      button:hover {
        background: #fff;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      button.mini {
        padding: 4px 10px;
        font-size: 13px;
      }
      select {
        font: inherit;
        font-size: 13px;
        color: #e6e6e6;
        background: #1c1e26;
        border: 1px solid #2c2f3a;
        border-radius: 6px;
        padding: 4px 6px;
      }
      .msg {
        margin-top: 12px;
        min-height: 20px;
        font-size: 14px;
      }
      .msg.err {
        color: #ff8a8a;
      }
      .msg.ok {
        color: #8affb0;
      }
      h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #8a8f98;
        margin: 40px 0 12px;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li.project {
        padding: 10px 12px;
        border: 1px solid #262830;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      li.project:hover {
        border-color: #3a3d48;
      }
      li.project.sel {
        border-color: #5b8cff;
      }
      li.project .conv {
        color: #8a8f98;
        font-size: 12px;
      }
      .empty {
        color: #8a8f98;
        font-size: 14px;
      }
      /* Plan view */
      .plan-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      .plan-path {
        color: #8a8f98;
        font-size: 12px;
        margin: 0 0 16px;
      }
      .task {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid #262830;
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 14px;
      }
      .task .text {
        flex: 1;
      }
      .task.checked .text {
        color: #8a8f98;
        text-decoration: line-through;
      }
      .badge {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 3px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .badge.not-started {
        background: #23262f;
        color: #8a8f98;
      }
      .badge.in-progress {
        background: #1e3a5f;
        color: #7cc0ff;
      }
      .badge.completed-unaccepted {
        background: #4a3410;
        color: #ffcf6b;
      }
      .badge.accepted {
        background: #14401f;
        color: #8affb0;
      }
      /* completed-unaccepted surfaced loudly: highlight the whole row */
      .task.completed-unaccepted {
        border-color: #ffcf6b;
        background: #221a08;
      }
      .runmeta {
        color: #8a8f98;
        font-size: 12px;
        min-width: 44px;
        text-align: right;
      }
      .review {
        margin: 0 0 16px;
        padding: 10px 12px;
        border: 1px solid #ffcf6b;
        border-radius: 8px;
        background: #221a08;
        color: #ffcf6b;
        font-size: 13px;
        font-weight: 500;
      }
      details.raw {
        margin-top: 28px;
      }
      details.raw summary {
        cursor: pointer;
        color: #8a8f98;
        font-size: 13px;
      }
      pre.md {
        margin-top: 12px;
        padding: 14px;
        background: #0f1014;
        border: 1px solid #262830;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        color: #c9ccd4;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>loopfleet</h1>
      <p class="sub">Register a git repository, then launch looping runs against its plan tasks.</p>

      <button id="add">Add project…</button>
      <div id="msg" class="msg"></div>

      <h2>Projects</h2>
      <ul id="projects"></ul>
      <p id="empty" class="empty">No projects registered yet.</p>

      <div id="plan"></div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;
      const { open } = window.__TAURI__.dialog;

      const addBtn = document.getElementById("add");
      const msg = document.getElementById("msg");
      const list = document.getElementById("projects");
      const empty = document.getElementById("empty");
      const planEl = document.getElementById("plan");

      const AGENTS = ["claude", "pi", "cursor"];
      let selectedProject = null;

      function setMsg(text, cls) {
        msg.textContent = text;
        msg.className = "msg" + (cls ? " " + cls : "");
      }

      async function refresh() {
        const projects = await invoke("list_projects");
        list.innerHTML = "";
        empty.style.display = projects.length ? "none" : "block";
        for (const p of projects) {
          const li = document.createElement("li");
          li.className = "project" + (p.id === selectedProject ? " sel" : "");
          li.textContent = p.repo_path;
          const conv = document.createElement("div");
          conv.className = "conv";
          conv.textContent = "convention: " + p.plan_convention;
          li.appendChild(conv);
          li.addEventListener("click", () => selectProject(p.id));
          list.appendChild(li);
        }
      }

      async function selectProject(id) {
        selectedProject = id;
        await refresh();
        await loadPlan(id);
      }

      async function loadPlan(id) {
        planEl.innerHTML = "";
        let views;
        try {
          views = await invoke("plan_overview", { projectId: id });
        } catch (e) {
          planEl.innerHTML = "";
          const p = document.createElement("p");
          p.className = "msg err";
          p.textContent = String(e);
          planEl.appendChild(p);
          return;
        }
        if (!views.length) {
          const p = document.createElement("p");
          p.className = "empty";
          p.textContent = "No plan found (expected PRD.md at the repo root).";
          planEl.appendChild(p);
          return;
        }
        for (const v of views) renderPlan(v);
      }

      function renderPlan(v) {
        const h = document.createElement("h2");
        h.textContent = "Plan";
        planEl.appendChild(h);

        const title = document.createElement("p");
        title.className = "plan-title";
        title.textContent = v.title || "(untitled plan)";
        planEl.appendChild(title);

        const path = document.createElement("p");
        path.className = "plan-path";
        path.textContent = v.file_path;
        planEl.appendChild(path);

        const reviewCount = v.tasks.filter(
          (t) => t.status === "completed-unaccepted"
        ).length;
        if (reviewCount) {
          const r = document.createElement("div");
          r.className = "review";
          r.textContent =
            reviewCount +
            (reviewCount === 1 ? " task is" : " tasks are") +
            " completed and waiting to be reviewed.";
          planEl.appendChild(r);
        }

        for (const t of v.tasks) planEl.appendChild(renderTask(v, t));

        const details = document.createElement("details");
        details.className = "raw";
        const summary = document.createElement("summary");
        summary.textContent = "Frozen plan source";
        details.appendChild(summary);
        const pre = document.createElement("pre");
        pre.className = "md";
        pre.textContent = v.markdown;
        details.appendChild(pre);
        planEl.appendChild(details);
      }

      function renderTask(plan, t) {
        const row = document.createElement("div");
        row.className = "task " + t.status + (t.checked ? " checked" : "");

        const badge = document.createElement("span");
        badge.className = "badge " + t.status;
        badge.textContent = t.status.replace(/-/g, " ");
        row.appendChild(badge);

        const text = document.createElement("span");
        text.className = "text";
        text.textContent = t.text;
        row.appendChild(text);

        const meta = document.createElement("span");
        meta.className = "runmeta";
        meta.textContent = t.run_count ? t.run_count + " run" + (t.run_count === 1 ? "" : "s") : "";
        row.appendChild(meta);

        // Launch affordance: agent + iteration count + Run. Authored-checked
        // tasks are excluded from launching (PRD: `checked` gates launch).
        if (!t.checked) {
          const agentSel = document.createElement("select");
          for (const a of AGENTS) {
            const o = document.createElement("option");
            o.value = a;
            o.textContent = a;
            agentSel.appendChild(o);
          }
          row.appendChild(agentSel);

          const iterSel = document.createElement("select");
          for (const n of [1, 3, 5, 10]) {
            const o = document.createElement("option");
            o.value = String(n);
            o.textContent = "×" + n;
            if (n === 5) o.selected = true;
            iterSel.appendChild(o);
          }
          row.appendChild(iterSel);

          const btn = document.createElement("button");
          btn.className = "mini";
          btn.textContent = "Run";
          btn.addEventListener("click", async () => {
            btn.disabled = true;
            setMsg("");
            try {
              const runId = await invoke("launch_run", {
                projectId: selectedProject,
                taskAnchor: t.anchor,
                agent: agentSel.value,
                maxIterations: Number(iterSel.value),
              });
              setMsg("Launched run " + runId, "ok");
              await loadPlan(selectedProject);
            } catch (e) {
              setMsg(String(e), "err");
              btn.disabled = false;
            }
          });
          row.appendChild(btn);
        }

        return row;
      }

      addBtn.addEventListener("click", async () => {
        const folder = await open({ directory: true, multiple: false });
        if (!folder) return;
        addBtn.disabled = true;
        setMsg("");
        try {
          const project = await invoke("register_project", { path: folder });
          setMsg("Registered " + project.repo_path, "ok");
          await refresh();
        } catch (e) {
          setMsg(String(e), "err");
        } finally {
          addBtn.disabled = false;
        }
      });

      refresh();
    </script>
  </body>
</html>
